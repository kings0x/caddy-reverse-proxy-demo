services:
  redis:
    image: redis:7.2
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    
    
  caddy:
    build: 
      context: .
      dockerfile: Dockerfile.caddy
      network: host
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

    depends_on:
      - redis
    
volumes:
  caddy_data:
  caddy_config:
  redis_data: